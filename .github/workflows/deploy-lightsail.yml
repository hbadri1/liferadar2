name: Deploy to Lightsail

on:
  workflow_run:
    workflows: ["Build and Push to ECR"]
    types:
      - completed
  workflow_dispatch:  # Allow manual trigger
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: liferadar/apps
  LIGHTSAIL_IP: ${{ secrets.LIGHTSAIL_IP }}
  LIGHTSAIL_USER: ec2-user

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get deployment info
        id: deploy-info
        run: |
          IMAGE_TAG=${{ github.event.inputs.image_tag || 'latest' }}
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image_uri=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H ${{ env.LIGHTSAIL_IP }} >> ~/.ssh/known_hosts

      - name: Pull latest image and restart container
        run: |
          ssh -i ~/.ssh/lightsail_key ${{ env.LIGHTSAIL_USER }}@${{ env.LIGHTSAIL_IP }} << 'EOF'
          set -e
          echo "Pulling Docker image: ${{ steps.deploy-info.outputs.image_uri }}"
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          docker pull ${{ steps.deploy-info.outputs.image_uri }}

          echo "Stopping current container..."
          docker-compose -f docker-compose.yml down || true

          echo "Starting new container with image..."
          export IMAGE_TAG=${{ steps.deploy-info.outputs.image_tag }}
          docker-compose -f docker-compose.yml up -d

          echo "Waiting for health check..."
          sleep 10
          docker ps
          EOF

      - name: Verify deployment
        run: |
          for i in {1..30}; do
            if curl -f http://${{ env.LIGHTSAIL_IP }}/management/health 2>/dev/null | grep -q '"status":"UP"'; then
              echo "✓ Application is healthy!"
              exit 0
            fi
            echo "Attempt $i/30: Health check pending..."
            sleep 2
          done
          echo "✗ Application health check failed"
          exit 1

      - name: Deployment success
        run: |
          echo "✓ Deployment completed successfully"
          echo "  Image: ${{ steps.deploy-info.outputs.image_uri }}"
          echo "  Server: http://${{ env.LIGHTSAIL_IP }}"

