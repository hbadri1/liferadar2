<div class="login-shell">
  <div class="d-flex justify-content-center">
    <div class="col-xl-5 col-lg-6 col-md-8 col-sm-10">
      <div class="login-card">
        <div class="login-brand text-center">
          <img src="content/images/liferadar-logo-primary.svg" alt="Liferadar" class="login-brand-logo" />
          <p class="login-brand-subtitle mb-0">Track growth, see signals, move with clarity.</p>
        </div>

        <div class="login-card-body">
          <h1 class="login-title" data-cy="loginTitle" jhiTranslate="login.title">Sign in</h1>
          <p class="login-copy text-muted">Access your dashboard, family insights, and daily evaluations.</p>

          @if (authenticationError()) {
            <div class="alert alert-danger" data-cy="loginError" jhiTranslate="login.messages.error.authentication">
              <strong>Failed to sign in!</strong> Please check your credentials and try again.
            </div>
          }

          <form class="form" (ngSubmit)="login()" [formGroup]="loginForm">
            <div class="mb-3">
              <label class="username-label form-label" for="username" jhiTranslate="global.form.username.label">Username</label>
              <input
                type="text"
                class="form-control login-input"
                name="username"
                id="username"
                placeholder="{{ 'global.form.username.placeholder' | translate }}"
                formControlName="username"
                data-cy="username"
              />
            </div>

            <div class="mb-3">
              <label class="form-label" for="password" jhiTranslate="login.form.password">Password</label>
              <input
                type="password"
                class="form-control login-input"
                name="password"
                id="password"
                placeholder="{{ 'login.form.password.placeholder' | translate }}"
                formControlName="password"
                data-cy="password"
              />
            </div>

            <div class="form-check mb-3">
              <label class="form-check-label" for="rememberMe">
                <input class="form-check-input" type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />
                <span jhiTranslate="login.form.rememberme">Remember me</span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary w-100 login-submit" data-cy="submit" jhiTranslate="login.form.button">Sign in</button>
          </form>

          <div class="mt-3 alert alert-warning">
            <a class="alert-link" routerLink="/account/reset/request" data-cy="forgetYourPasswordSelector" jhiTranslate="login.password.forgot"
              >Did you forget your password?</a
            >
          </div>

          <div class="alert alert-primary mb-0">
            <span jhiTranslate="global.messages.info.register.noaccount">You don&apos;t have an account yet?</span>
            <a class="alert-link" routerLink="/account/register" jhiTranslate="global.messages.info.register.link">Register a new account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
