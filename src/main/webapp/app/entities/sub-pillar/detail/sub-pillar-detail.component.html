<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (subPillar(); as subPillarRef) {
      <div>
        <h2 data-cy="subPillarDetailsHeading"><span jhiTranslate="liferadarApp.subPillar.detail.title">Sub Life Pillar</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ subPillarRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="liferadarApp.subPillar.code">Code</span></dt>
          <dd>
            <span>{{ subPillarRef.code }}</span>
          </dd>
          <dt><span jhiTranslate="liferadarApp.subPillar.isActive">Is Active</span></dt>
          <dd>
            <span>{{ subPillarRef.isActive }}</span>
          </dd>
          <dt><span jhiTranslate="liferadarApp.subPillar.owner">Owner</span></dt>
          <dd>
            @if (subPillar()!.owner) {
              <div>
                <a [routerLink]="['/extended-user', subPillar()!.owner?.id, 'view']">{{ subPillarRef.owner?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/sub-pillar', subPillarRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
