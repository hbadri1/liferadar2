<div class="modal-header bg-info text-white">
  <h5 class="modal-title">
    <fa-icon icon="plus" class="me-2"></fa-icon>
    {{ 'trips.newSubStep' | translate }}
  </h5>
  <button type="button" class="btn-close btn-close-white" (click)="cancel()"></button>
</div>

<div class="modal-body">
  @if (errorMsg()) {
    <div class="alert alert-danger">{{ errorMsg()! | translate }}</div>
  }

  <form [formGroup]="editForm">
    <div class="mb-3">
      <label class="form-label fw-bold" for="subStepActionName">{{ 'trips.fields.subStepName' | translate }} *</label>
      <input
        id="subStepActionName"
        type="text"
        class="form-control"
        formControlName="actionName"
        placeholder="{{ 'trips.fields.subStepNamePlaceholder' | translate }}"
      />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label fw-bold" for="subStepStartDate">{{ 'trips.fields.startDate' | translate }} *</label>
        <div class="row g-2">
          <div class="col-7">
            <input id="subStepStartDate" type="date" class="form-control" formControlName="startDate" />
          </div>
          <div class="col-5">
            <select class="form-select" formControlName="startTime">
              @for (t of timeOptions; track t) {
                <option [value]="t">{{ t }}</option>
              }
            </select>
          </div>
        </div>
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label fw-bold" for="subStepEndDate">{{ 'trips.fields.endDate' | translate }} *</label>
        <div class="row g-2">
          <div class="col-7">
            <input id="subStepEndDate" type="date" class="form-control" formControlName="endDate" />
          </div>
          <div class="col-5">
            <select class="form-select" formControlName="endTime">
              @for (t of timeOptions; track t) {
                <option [value]="t">{{ t }}</option>
              }
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="mb-2">
      <label class="form-label fw-bold" for="subStepNotes">{{ 'trips.fields.notes' | translate }}</label>
      <textarea
        id="subStepNotes"
        class="form-control"
        rows="3"
        formControlName="notes"
        placeholder="{{ 'trips.fields.notesPlaceholder' | translate }}"
      ></textarea>
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="cancel()">
    <fa-icon icon="times"></fa-icon> {{ 'entity.action.cancel' | translate }}
  </button>
  <button type="button" class="btn btn-primary" [disabled]="isSaving() || editForm.invalid" (click)="save()">
    @if (isSaving()) {
      <span class="spinner-border spinner-border-sm me-1"></span>
    } @else {
      <fa-icon icon="save"></fa-icon>
    }
    {{ 'entity.action.save' | translate }}
  </button>
</div>
