<div class="modal-header">
  <h5 class="modal-title">
    <fa-icon icon="clipboard-check" class="me-2 text-primary"></fa-icon>
    <span jhiTranslate="goals.reviewGoal">Review Goal</span>: {{ goal.title }}
  </h5>
  <button type="button" class="btn-close" (click)="dismiss()"></button>
</div>

<div class="modal-body">
  @if (errorMsg) {
    <div class="alert alert-danger">{{ errorMsg | translate }}</div>
  }

  <form>
    <!-- Review Date -->
    <div class="mb-3">
      <label class="form-label fw-semibold" jhiTranslate="goals.fields.reviewDate">Review Date <span class="text-danger">*</span></label>
      <input type="date" class="form-control" [(ngModel)]="form.updateDate" name="updateDate" required />
    </div>

    <!-- Summary -->
    <div class="mb-3">
      <label class="form-label" jhiTranslate="goals.fields.summary">What happened since last review?</label>
      <textarea class="form-control" [(ngModel)]="form.summary" name="summary" rows="3" maxlength="2000"
                [placeholder]="'goals.fields.summaryPlaceholder' | translate"></textarea>
    </div>

    <div class="row">
      <!-- Progress -->
      <div class="col-md-6 mb-3">
        <label class="form-label" jhiTranslate="goals.fields.progressPercentage">Progress %</label>
        <input type="number" class="form-control" [(ngModel)]="form.progressPercentage" name="progressPercentage" min="0" max="100" />
      </div>
      <!-- Status -->
      <div class="col-md-6 mb-3">
        <label class="form-label" jhiTranslate="goals.fields.status">Status</label>
        <select class="form-select" [(ngModel)]="form.status" name="status">
          <option [ngValue]="null">— unchanged —</option>
          @for (s of statuses; track s) {
            <option [value]="s">{{ ('goals.status.' + s.toLowerCase()) | translate }}</option>
          }
        </select>
      </div>
    </div>

    <div class="row">
      <!-- Confidence -->
      <div class="col-md-6 mb-3">
        <label class="form-label" jhiTranslate="goals.fields.confidenceLevel">Confidence</label>
        <select class="form-select" [(ngModel)]="form.confidenceLevel" name="confidenceLevel">
          <option [ngValue]="null">— unchanged —</option>
          @for (p of priorities; track p) {
            <option [value]="p">{{ ('goals.priority.' + p.toLowerCase()) | translate }}</option>
          }
        </select>
      </div>
      <!-- Mood -->
      <div class="col-md-6 mb-3">
        <label class="form-label" jhiTranslate="goals.fields.mood">Mood</label>
        <input type="text" class="form-control" [(ngModel)]="form.mood" name="mood" maxlength="50"
               [placeholder]="'goals.fields.moodPlaceholder' | translate" />
      </div>
    </div>

    <!-- Blockers -->
    <div class="mb-3">
      <label class="form-label text-danger" jhiTranslate="goals.fields.blockers">Current Blockers</label>
      <textarea class="form-control" [(ngModel)]="form.blockers" name="blockers" rows="2" maxlength="1000"
                [placeholder]="'goals.fields.blockersPlaceholder' | translate"></textarea>
    </div>

    <!-- Next Step -->
    <div class="mb-3">
      <label class="form-label text-success" jhiTranslate="goals.fields.nextStep">Next Step / Focus</label>
      <textarea class="form-control" [(ngModel)]="form.nextStep" name="nextStep" rows="2" maxlength="1000"
                [placeholder]="'goals.fields.nextStepPlaceholder' | translate"></textarea>
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary" (click)="dismiss()" jhiTranslate="entity.action.cancel">Cancel</button>
  <button type="button" class="btn btn-primary" (click)="save()" [disabled]="isSaving || !form.updateDate">
    @if (isSaving) {
      <span class="spinner-border spinner-border-sm me-1"></span>
    }
    <span jhiTranslate="goals.submitReview">Submit Review</span>
  </button>
</div>
