<footer class="app-footer">
  <div class="footer-inner">

    <!-- Top row: brand + links + feedback -->
    <div class="footer-top">
      <div class="footer-brand">
        <span class="footer-logo-mark">⬡</span>
        <span class="footer-brand-name">Liferadar</span>
      </div>

      <nav class="footer-links" aria-label="Footer navigation">
        <a href="https://atharsense.com" target="_blank" rel="noopener noreferrer" class="footer-link">
          <fa-icon icon="globe" class="me-1"></fa-icon>
          <span jhiTranslate="footer.atharsense">Atharsense</span>
        </a>
      </nav>

      <button type="button" class="footer-feedback-btn" (click)="openFeedback()">
        <fa-icon icon="comment-dots" class="me-1"></fa-icon>
        <span jhiTranslate="footer.feedback">Feedback</span>
      </button>
    </div>

    <!-- Bottom row: copyright -->
    <div class="footer-bottom">
      <span class="footer-copy">
        &copy; {{ currentYear }}&nbsp;
        <a href="https://atharsense.com" target="_blank" rel="noopener noreferrer" class="footer-aths-link" jhiTranslate="footer.atharsense">Atharsense</a>.
        &nbsp;<span jhiTranslate="footer.rights">All rights reserved.</span>
      </span>
      <span class="footer-made-with">
        <span jhiTranslate="footer.madeWith">Made with</span>
        <fa-icon icon="heart" class="footer-heart mx-1"></fa-icon>
        <span jhiTranslate="footer.forFamilies">for families</span>
      </span>
    </div>

  </div>
</footer>
