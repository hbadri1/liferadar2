services:
  postgres:
    image: postgres:16-alpine
    container_name: liferadar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE}
    container_name: liferadar-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: ${CONTAINER_PORT}
      JHIPSTER_SLEEP: ${JHIPSTER_SLEEP}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_LIQUIBASE_USER: ${POSTGRES_USER}
      SPRING_LIQUIBASE_PASSWORD: ${POSTGRES_PASSWORD}
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET: ${JWT_BASE64_SECRET}
      JHIPSTER_MAIL_BASE_URL: ${JHIPSTER_MAIL_BASE_URL}
      TICKTICK_REDIRECT_URI: ${TICKTICK_REDIRECT_URI}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.hostinger.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-465}
      SPRING_MAIL_PROTOCOL: ${SPRING_MAIL_PROTOCOL:-smtp}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-info@atharsense.com}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: liferadar-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    command: >-
      /bin/sh -c "if [ -z \"$${DOMAIN_NAME}\" ]; then
      echo 'DOMAIN_NAME is required' >&2;
      exit 1;
      fi;
      if [ ! -f /etc/letsencrypt/live/$${DOMAIN_NAME}/fullchain.pem ]; then
      apk add --no-cache openssl > /dev/null;
      mkdir -p /etc/letsencrypt/live/$${DOMAIN_NAME};
      openssl req -x509 -nodes -newkey rsa:2048 -days 1
      -keyout /etc/letsencrypt/live/$${DOMAIN_NAME}/privkey.pem
      -out /etc/letsencrypt/live/$${DOMAIN_NAME}/fullchain.pem
      -subj '/CN=$${DOMAIN_NAME}';
      fi;
      envsubst '$${DOMAIN_NAME}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf;
      while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    container_name: liferadar-certbot
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

  certbot-init:
    image: certbot/certbot:latest
    container_name: liferadar-certbot-init
    profiles:
      - init
    depends_on:
      nginx:
        condition: service_started
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "certbot certonly --webroot -w /var/www/certbot --agree-tos --no-eff-email --email $${LETSENCRYPT_EMAIL} -d $${DOMAIN_NAME}"

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:
